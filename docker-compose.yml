services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb-copilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: kb-copilot-backend
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
    container_name: kb-copilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_data: